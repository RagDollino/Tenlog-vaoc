##############################################
# VAOC - Virtual Auto Offset Calibration
# XY toolhead offset calibration for IDEX printers
# Version: 2.0 - Universal
# Project: https://github.com/RagDollino/Tenlog-vaoc
##############################################
#
# VARIABLES TO CONFIGURE:
#   variable_camera_x / variable_camera_y  -> camera position on the bed
#   variable_t0_park_x                     -> T0 park position (left extreme)
#   variable_t1_park_x                     -> T1 park position (right extreme)
#   variable_safe_z                        -> safe Z height for carriage switching
#   variable_jog_speed                     -> default jog speed in mm/s
#
# PUBLIC MACROS:
#   VAOC_START    -> starts the session (home + moves T0 to camera)
#   VAOC_MOVE     -> moves the active carriage (X= Y= Z= F=)
#   VAOC_SET_T0   -> saves the control point and activates T1
#   VAOC_SET_T1   -> calculates the XY offset
#   VAOC_SWITCH   -> toggles between T0 and T1 for visual verification
#   VAOC_ACCEPT   -> reports the calculated offset and ends the session
#   VAOC_CANCEL   -> cancels without saving, parks carriages
##############################################

[gcode_macro VAOC_VARS]
# ── Camera position on the bed ───────────────────────
variable_camera_x: 150.0
variable_camera_y: 30.0
# ── Carriage park positions (collision avoidance) ────
variable_t0_park_x: -53.0
variable_t1_park_x: 353.0
# ── Safe Z height for carriage switching ─────────────
variable_safe_z: 50.0
# ── Default jog speed in mm/s ────────────────────────
variable_jog_speed: 10.0
# ── Internal state ───────────────────────────────────
variable_calibrating: 0
variable_control_x: 0.0
variable_control_y: 0.0
variable_t1_centered_x: 0.0
variable_t1_centered_y: 0.0
variable_pending_x_offset: 0.0
variable_pending_y_offset: 0.0
variable_control_set: 0
gcode:
    RESPOND MSG="VAOC: camera position X={printer['gcode_macro VAOC_VARS'].camera_x} Y={printer['gcode_macro VAOC_VARS'].camera_y}"


##############################################
# VAOC_START
# Starts the calibration session:
# 1. Homes if needed
# 2. Activates T0 with no offsets
# 3. Moves T0 to the camera position
##############################################
[gcode_macro VAOC_START]
description: Start VAOC XY calibration session
gcode:
    {% set vaoc = printer["gcode_macro VAOC_VARS"] %}

    # Reset internal state for a clean session
    SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=calibrating VALUE=1
    SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=control_set VALUE=0
    SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=t1_centered_x VALUE=0.0
    SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=t1_centered_y VALUE=0.0

    # Home if not already homed
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        RESPOND MSG="VAOC: Homing..."
        G28
    {% else %}
        RESPOND MSG="VAOC: Already homed, continuing..."
    {% endif %}

    # Raise to safe Z before moving
    G90
    G0 Z{vaoc.safe_z} F{vaoc.jog_speed * 60}

    # Activate T0 directly (bypasses full toolchange sequence)
    _VAOC_ACTIVATE_T0

    # Move T0 to camera position
    G90
    G0 X{vaoc.camera_x} Y{vaoc.camera_y} F7200

    RESPOND MSG="VAOC: T0 at camera position. Center the nozzle and press SET T0."


##############################################
# _VAOC_ACTIVATE_T0
# Activates carriage 0 directly via
# SET_DUAL_CARRIAGE, bypassing the full
# toolchange macro (no purge, no zhop).
##############################################
[gcode_macro _VAOC_ACTIVATE_T0]
description: Activate T0 directly for VAOC (bypasses full toolchange)
gcode:
    {% set vaoc = printer["gcode_macro VAOC_VARS"] %}

    # Ensure safe Z before switching carriages
    {% if printer.toolhead.position.z < vaoc.safe_z %}
        G90
        G0 Z{vaoc.safe_z} F{vaoc.jog_speed * 60}
    {% endif %}

    # Park T1 first to avoid collision
    SET_DUAL_CARRIAGE CARRIAGE=1
    G90
    G0 X{vaoc.t1_park_x} F7200

    # Activate carriage 0
    SET_DUAL_CARRIAGE CARRIAGE=0
    ACTIVATE_EXTRUDER EXTRUDER=extruder

    # Clear any residual offset
    SET_GCODE_OFFSET X=0 Y=0 MOVE=0


##############################################
# _VAOC_ACTIVATE_T1
# Activates carriage 1 directly via
# SET_DUAL_CARRIAGE, bypassing the full
# toolchange macro (no purge, no zhop).
##############################################
[gcode_macro _VAOC_ACTIVATE_T1]
description: Activate T1 directly for VAOC (bypasses full toolchange)
gcode:
    {% set vaoc = printer["gcode_macro VAOC_VARS"] %}

    # Ensure safe Z before switching carriages
    {% if printer.toolhead.position.z < vaoc.safe_z %}
        G90
        G0 Z{vaoc.safe_z} F{vaoc.jog_speed * 60}
    {% endif %}

    # Park T0 first to avoid collision
    SET_DUAL_CARRIAGE CARRIAGE=0
    G90
    G0 X{vaoc.t0_park_x} F7200

    # Activate carriage 1
    SET_DUAL_CARRIAGE CARRIAGE=1
    ACTIVATE_EXTRUDER EXTRUDER=extruder1

    # T1 operates in raw machine coordinates during VAOC
    SET_GCODE_OFFSET X=0 Y=0 MOVE=0


##############################################
# VAOC_MOVE
# Moves the active carriage in relative mode.
# Supports X, Y and Z axes.
# Parameters: X= Y= Z= F= (F in mm/min, optional)
# Examples:
#   VAOC_MOVE X=0.1
#   VAOC_MOVE Y=-0.05
#   VAOC_MOVE X=0.1 Y=0.1
#   VAOC_MOVE Z=1.0
##############################################
[gcode_macro VAOC_MOVE]
description: Relative jog during VAOC calibration
gcode:
    {% set vaoc = printer["gcode_macro VAOC_VARS"] %}
    {% if vaoc.calibrating == 0 %}
        RESPOND MSG="VAOC: No active session. Run VAOC_START first."
    {% else %}
        {% set dx = params.X|default(0)|float %}
        {% set dy = params.Y|default(0)|float %}
        {% set dz = params.Z|default(0)|float %}
        {% set feed = params.F|default(vaoc.jog_speed * 60)|float %}

        SAVE_GCODE_STATE NAME=vaoc_jog
        G91
        G0 X{dx} Y{dy} Z{dz} F{feed}
        RESTORE_GCODE_STATE NAME=vaoc_jog MOVE=0
    {% endif %}


##############################################
# VAOC_SET_T0
# Saves the current T0 position as the
# reference control point, then activates T1
# and moves it to that exact same position.
##############################################
[gcode_macro VAOC_SET_T0]
description: Save T0 control point and activate T1
gcode:
    {% set vaoc = printer["gcode_macro VAOC_VARS"] %}
    {% if vaoc.calibrating == 0 %}
        RESPOND MSG="VAOC: No active session. Run VAOC_START first."
    {% else %}
        # Read current T0 position
        {% set cx = printer.toolhead.position.x %}
        {% set cy = printer.toolhead.position.y %}

        # Save as reference control point
        SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=control_x VALUE={cx}
        SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=control_y VALUE={cy}
        SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=control_set VALUE=1

        RESPOND MSG="VAOC: T0 control point saved -> X={'%.4f'|format(cx)} Y={'%.4f'|format(cy)}"
        RESPOND MSG="VAOC: Activating T1, moving it to control point..."

        # Activate T1 directly
        _VAOC_ACTIVATE_T1

        # Move T1 to the exact control point position
        G90
        G0 X{cx} Y{cy} F7200

        RESPOND MSG="VAOC: T1 at position. Center the nozzle and press SET T1."
    {% endif %}


##############################################
# VAOC_SET_T1
# Reads the current T1 position and calculates
# the XY offset relative to the T0 control point.
# Also saves T1 centered position for VAOC_SWITCH.
##############################################
[gcode_macro VAOC_SET_T1]
description: Calculate XY offset between T0 and T1
gcode:
    {% set vaoc = printer["gcode_macro VAOC_VARS"] %}
    {% if vaoc.calibrating == 0 %}
        RESPOND MSG="VAOC: No active session. Run VAOC_START first."
    {% else %}
        # Read current T1 position
        {% set tx = printer.toolhead.position.x %}
        {% set ty = printer.toolhead.position.y %}

        # Calculate delta from control point
        {% set dx = tx - vaoc.control_x %}
        {% set dy = ty - vaoc.control_y %}

        # Save pending offset
        SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=pending_x_offset VALUE={dx}
        SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=pending_y_offset VALUE={dy}

        # Save T1 centered position for VAOC_SWITCH
        SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=t1_centered_x VALUE={tx}
        SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=t1_centered_y VALUE={ty}

        RESPOND MSG="VAOC: Offset calculated -> X={'%.4f'|format(dx)} Y={'%.4f'|format(dy)}"
        RESPOND MSG="VAOC: Press ACCEPT to confirm or SWITCH to verify alignment."
    {% endif %}


##############################################
# VAOC_SWITCH
# Toggles between T0 and T1 for visual
# verification. Both tools go to their
# respective centered positions.
# Does NOT clear or recalculate the offset.
#
# T0 -> goes to control_x / control_y
# T1 -> goes to t1_centered_x / t1_centered_y
#        (falls back to control point if SET T1
#         has not been pressed yet)
##############################################
[gcode_macro VAOC_SWITCH]
description: Toggle between T0 and T1 for visual verification
gcode:
    {% set vaoc = printer["gcode_macro VAOC_VARS"] %}
    {% if vaoc.calibrating == 0 %}
        RESPOND MSG="VAOC: No active session. Run VAOC_START first."
    {% elif vaoc.control_set == 0 %}
        RESPOND MSG="VAOC: Press SET T0 first to establish the control point."
    {% else %}
        {% if printer.toolhead.extruder == 'extruder' %}
            # T0 active -> switch to T1
            # Use T1 centered position if SET T1 was already done,
            # otherwise fall back to the control point
            {% if vaoc.t1_centered_x != 0.0 or vaoc.t1_centered_y != 0.0 %}
                {% set t1x = vaoc.t1_centered_x %}
                {% set t1y = vaoc.t1_centered_y %}
            {% else %}
                {% set t1x = vaoc.control_x %}
                {% set t1y = vaoc.control_y %}
            {% endif %}
            RESPOND MSG="VAOC: Switching to T1 for verification..."
            _VAOC_ACTIVATE_T1
            G90
            G0 X{t1x} Y{t1y} F7200
            RESPOND MSG="VAOC: T1 at position. Check nozzle alignment."
        {% else %}
            # T1 active -> switch to T0 at control point
            RESPOND MSG="VAOC: Switching to T0 for verification..."
            _VAOC_ACTIVATE_T0
            G90
            G0 X{vaoc.control_x} Y{vaoc.control_y} F7200
            RESPOND MSG="VAOC: T0 at control point. Check nozzle alignment."
        {% endif %}
    {% endif %}


##############################################
# VAOC_ACCEPT
# Reports the calculated offset values and
# ends the calibration session cleanly.
# Apply the reported values to your printer
# configuration manually.
##############################################
[gcode_macro VAOC_ACCEPT]
description: Report calculated offset and end the VAOC session
gcode:
    {% set vaoc = printer["gcode_macro VAOC_VARS"] %}
    {% if vaoc.calibrating == 0 %}
        RESPOND MSG="VAOC: No active session."
    {% else %}
        {% set px = vaoc.pending_x_offset %}
        {% set py = vaoc.pending_y_offset %}

        # Close session
        SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=calibrating VALUE=0
        SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=control_set VALUE=0

        # Report result — apply these values to your T1 offset configuration
        RESPOND MSG="VAOC: ========================================="
        RESPOND MSG="VAOC: Calibration complete."
        RESPOND MSG="VAOC: Apply these offsets to your T1 macro:"
        RESPOND MSG="VAOC:   X offset = {'%.4f'|format(px)}"
        RESPOND MSG="VAOC:   Y offset = {'%.4f'|format(py)}"
        RESPOND MSG="VAOC: ========================================="

        # Park carriages safely
        G28 X
    {% endif %}


##############################################
# VAOC_CANCEL
# Cancels the session without saving.
# Parks carriages safely.
##############################################
[gcode_macro VAOC_CANCEL]
description: Cancel VAOC session without saving
gcode:
    {% set vaoc = printer["gcode_macro VAOC_VARS"] %}

    # Close session
    SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=calibrating VALUE=0
    SET_GCODE_VARIABLE MACRO=VAOC_VARS VARIABLE=control_set VALUE=0

    RESPOND MSG="VAOC: Calibration cancelled. No changes were made."

    # Park carriages if homed
    {% if 'xyz' in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}
